# Deployment は、Pod を複数管理するための Kubernetes リソースです。
# 指定した数の Pod を起動し、Pod が停止した場合は自動で再作成します。
apiVersion: apps/v1
kind: Deployment

metadata:
  # Deployment の名前です。
  # kubectl get deployment で確認すると、この名前で表示されます。
  name: hello-server

  # Deployment 自体に付けるラベルです。
  # リソースを分類・識別するために使います。
  labels:
    app: hello-server

spec:
  # 起動しておきたい Pod の数です。
  # この例では hello-server の Pod を 3 個起動します。
  replicas: 3

  # この Deployment が管理する Pod を見つけるための条件です。
  # app: hello-server というラベルを持つ Pod を管理対象にします。
  selector:
    matchLabels:
      app: hello-server

  # Deployment が作成する Pod のテンプレートです。
  # 実際に作られる Pod の設定をここに書きます。
  template:
    metadata:
      # Pod に付けるラベルです。
      #
      # selector.matchLabels と一致している必要があります。
      # 一致していないと Deployment が Pod を正しく管理できません。
      labels:
        app: hello-server

    spec:
      # Pod の中で起動するコンテナを定義します。
      containers:
      # コンテナの名前です。
      - name: hello-server

        # 使用するコンテナイメージです。
        # この例では blux2/hello-server:1.6 を使います。
        image: blux2/hello-server:1.6

        # コンテナが使用するポートを定義します。
        ports:
        # アプリケーションが 8080 番ポートで待ち受けます。
        - containerPort: 8080

        # resources は、コンテナが使用する CPU やメモリの量を指定する設定です。
        #
        # requests と limits の 2 種類があります。
        resources:
          # requests は、コンテナ起動時に最低限必要とするリソース量です。
          #
          # Kubernetes は、この requests を見て、
          # どの Node に Pod を配置できるかを判断します。
          requests:
            # 最低限必要とするメモリ量です。
            #
            # 5Gi は 5GiB 程度のメモリを意味します。
            # この Pod を 3 個起動するため、合計で約 15GiB の
            # メモリ requests が必要になります。
            memory: "5Gi"

            # 最低限必要とする CPU 量です。
            #
            # 10m は 10 ミリ CPU の意味です。
            # 1000m = 1 CPU なので、10m = 0.01 CPU です。
            cpu: "10m"

          # limits は、コンテナが使用できるリソースの上限です。
          #
          # コンテナがこの上限を超えないように制限されます。
          limits:
            # 使用できるメモリの上限です。
            #
            # メモリ使用量が limit を超えると、
            # コンテナが強制終了される可能性があります。
            memory: "5Gi"

            # 使用できる CPU の上限です。
            #
            # CPU は limit を超えそうになると、使用量が制限されます。
            cpu: "10m"

        # Readiness probe の設定です。
        #
        # Readiness probe は、Pod がリクエストを受け付けられる状態かを確認します。
        #
        # 失敗している間、その Pod は Service の通信対象から外されます。
        # ただし、失敗してもコンテナは再起動されません。
        readinessProbe:
          # HTTP リクエストでヘルスチェックを行います。
          httpGet:
            # ヘルスチェックでアクセスするパスです。
            #
            # Kubernetes がコンテナに対して
            # http://<PodのIP>:8080/health のようにアクセスして確認します。
            path: /health

            # ヘルスチェックでアクセスするポート番号です。
            port: 8080

          # コンテナ起動後、最初の Readiness probe まで待つ秒数です。
          #
          # この例では、コンテナ起動後 5 秒待ってから
          # 最初のチェックを実行します。
          initialDelaySeconds: 5

          # ヘルスチェックを実行する間隔です。
          #
          # この例では、5 秒ごとに /health へアクセスして
          # リクエストを受け付けられる状態か確認します。
          periodSeconds: 5

        # Liveness probe の設定です。
        #
        # Liveness probe は、コンテナが正常に動き続けているかを確認します。
        #
        # 失敗が続くと、Kubernetes はコンテナが異常状態だと判断し、
        # コンテナを再起動します。
        livenessProbe:
          # HTTP リクエストでヘルスチェックを行います。
          httpGet:
            # ヘルスチェックでアクセスするパスです。
            #
            # Readiness probe と同じ /health を確認しています。
            path: /health

            # ヘルスチェックでアクセスするポート番号です。
            port: 8080

          # コンテナ起動後、最初の Liveness probe まで待つ秒数です。
          #
          # この例では、コンテナ起動後 10 秒待ってから
          # 最初のチェックを実行します。
          #
          # Readiness probe より少し遅く開始しています。
          initialDelaySeconds: 10

          # ヘルスチェックを実行する間隔です。
          #
          # この例では、5 秒ごとに /health へアクセスして
          # コンテナが正常に動いているか確認します。
          periodSeconds: 5