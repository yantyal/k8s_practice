# Kubernetes API のバージョンを指定します。
# Pod は基本的なリソースなので v1 を指定します。
apiVersion: v1

# 作成する Kubernetes リソースの種類を指定します。
# ここでは Pod を作成します。
#
# Pod とは、Kubernetes 上でコンテナを動かすための最小単位です。
kind: Pod

# この Pod 自体に関する情報を設定します。
# 名前やラベルなど、「Pod を識別するための情報」を書きます。
metadata:
  # Pod の名前です。
  # kubectl get pod などで表示される名前になります。
  name: myapp

  # Pod に付けるラベルです。
  # ラベルは Kubernetes 内でリソースを分類・検索するための目印です。
  #
  # 例:
  # kubectl get pod -l app=myapp
  #
  # のようにすると、app=myapp というラベルが付いた Pod を探せます。
  labels:
    # app というキーに myapp という値を設定しています。
    # 「この Pod は myapp アプリに関係するもの」と分かるようにしています。
    app: myapp

# Pod の具体的な中身を設定します。
# どのコンテナを動かすか、どのポートを使うかなどを書きます。
spec:
  # Pod 内で起動するコンテナの一覧です。
  #
  # Pod には 1 つ以上のコンテナを入れることができます。
  # 今回は hello-server というコンテナを 1 つだけ起動します。
  containers:
  # コンテナの名前です。
  # Pod 内でコンテナを識別するための名前です。
  - name: hello-server

    # 使用するコンテナイメージを指定します。
    #
    # blux2/hello-server:1.0 は Docker Hub などの
    # コンテナレジストリにあるイメージを表します。
    #
    # 形式:
    # イメージ名:タグ
    #
    # 今回は hello-server というアプリの
    # バージョン 1.0 のイメージを使用しています。
    image: blux2/hello-server:1.0

    # このコンテナが使用するポートの情報を設定します。
    #
    # これは「コンテナ内のアプリが何番ポートで待ち受けているか」を
    # Kubernetes に伝えるための設定です。
    ports:
    # コンテナ内でアプリが待ち受けているポート番号です。
    #
    # 今回の hello-server はコンテナ内部の 9080 番ポートで
    # HTTP リクエストなどを受け付ける想定です。
    - containerPort: 9080