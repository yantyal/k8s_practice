---
# Pod は、Kubernetes 上でコンテナを動かす最小単位です。
# この例では、nginx コンテナを 1 つ起動します。
apiVersion: v1
kind: Pod

metadata:
  # Pod の名前です。
  # kubectl get pod で確認すると、この名前で表示されます。
  name: nginx-sample

spec:
  # Pod の中で起動するコンテナを定義します。
  containers:
  # コンテナの名前です。
  - name: nginx-container

    # 使用するコンテナイメージです。
    # この例では nginx の 1.25.3 を使用します。
    image: nginx:1.25.3

    # volumeMounts は、Pod に用意した Volume を
    # コンテナ内のどこに配置するかを指定する設定です。
    #
    # 今回は Secret の内容をファイルとして
    # コンテナ内にマウントします。
    volumeMounts:
    # 下の volumes で定義している nginx-secret という Volume を使います。
    - name: nginx-secret

      # コンテナ内のマウント先ディレクトリです。
      #
      # この例では、Secret の内容が /etc/config 配下に
      # ファイルとして配置されます。
      #
      # Secret に server.key というキーがあるため、
      # コンテナ内では次のようなファイルになります。
      #
      # /etc/config/server.key
      mountPath: /etc/config

  # Pod で使用する Volume を定義します。
  #
  # Volume は、コンテナにファイルやディレクトリを渡すための仕組みです。
  volumes:
  # nginx-secret という名前の Volume を定義しています。
  #
  # volumeMounts.name と一致している必要があります。
  - name: nginx-secret

    # この Volume の元データとして Secret を使います。
    secret:
      # 使用する Secret の名前です。
      #
      # 下で定義している nginx-secret を参照します。
      secretName: nginx-secret

---
# Secret は、パスワード、秘密鍵、トークンなどの
# 機密情報を管理するための Kubernetes リソースです。
#
# ConfigMap と似ていますが、Secret は機密情報向けに使います。
apiVersion: v1
kind: Secret

metadata:
  # Secret の名前です。
  #
  # Pod 側の volumes.secret.secretName で
  # この名前を指定して参照します。
  name: nginx-secret

# Secret に保存するデータです。
#
# data に書く値は Base64 エンコードされた文字列にする必要があります。
# ただし、Base64 は暗号化ではありません。
data:
  # server.key というキーです。
  #
  # Secret を Volume としてマウントすると、
  # このキー名がそのままファイル名になります。
  #
  # 今回はコンテナ内に次のファイルとして作成されます。
  #
  # /etc/config/server.key
  server.key: ZU05a3UzZWNDcFVMOXpQb0lJdUcycHRaWkM1Q3U0WkNRWFJ5bWxIYWpZdlp5ZmZwTTYK